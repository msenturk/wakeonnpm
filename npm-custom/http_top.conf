# /data/nginx/custom/http_top.conf
# Mounted read-only into NPM. Set once — never edit again when adding containers.
#
# New managed containers are discovered automatically via Docker labels every
# 120 seconds. No nginx reload needed.

lua_shared_dict wakeonrequest_state 1m;
lua_package_path "/data/nginx/custom/?.lua;;";

init_worker_by_lua_block {
    require("wakeonrequest").auto_start_timers()
}
